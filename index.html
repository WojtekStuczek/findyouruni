<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preconnect to LCP-critical tile CDN (max 3 — Lighthouse penalises >4) -->
    <link rel="preconnect" href="https://a.basemaps.cartocdn.com" crossorigin />
    <link rel="preconnect" href="https://b.basemaps.cartocdn.com" crossorigin />
    <link rel="preconnect" href="https://c.basemaps.cartocdn.com" crossorigin />
    <link rel="preconnect" href="https://flagcdn.com" crossorigin />
    <link rel="dns-prefetch" href="https://flagcdn.com" />

    <!-- Fonts: async load to stay off critical path -->
    <link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Figtree:wght@400;500;600;700&display=swap" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Figtree:wght@400;500;600;700&display=swap" /></noscript>

    <!-- Preload critical data -->
    <link rel="preload" href="/data/universities.json" as="fetch" crossorigin />
    <link rel="preload" href="/data/cloudinaryUrls.json" as="fetch" crossorigin />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="any" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />

    <!-- Primary SEO -->
    <title>FindYourUni.eu — Top European Universities with English Programs</title>
    <meta name="description" content="Discover and compare 300+ European universities offering English-language degree programmes. Explore rankings, find top programs, and plan your study destination." />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large" />
    <link rel="canonical" href="https://www.findyouruni.eu/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.findyouruni.eu/" />
    <meta property="og:title" content="FindYourUni.eu — Top European Universities with English Programs" />
    <meta property="og:description" content="Compare 300+ European universities with English programmes. Open data, transparent methodology." />
    <meta property="og:image" content="https://www.findyouruni.eu/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Map of top European universities" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="FindYourUni.eu" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FindYourUni.eu — Top European Universities with English Programs" />
    <meta name="twitter:description" content="Compare 300+ European universities with English programmes." />
    <meta name="twitter:image" content="https://www.findyouruni.eu/og-image.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "FindYourUni.eu",
      "url": "https://www.findyouruni.eu",
      "description": "European university ranking platform with English-language programmes",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.findyouruni.eu/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root">
      <style>
        /* Critical above-the-fold CSS — renders shell before main bundle */
        *,*::before,*::after{box-sizing:border-box}
        body{margin:0;padding:0;overflow:hidden;font-family:"Figtree",ui-sans-serif,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
        #root{height:100vh;width:100vw}
        .initial-loader{display:flex;justify-content:center;align-items:center;height:100vh;width:100vw;background-color:#f8fafc}
        .spinner{width:40px;height:40px;border:4px solid #bfdbfe;border-top:4px solid #3b82f6;border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
      </style>
      <div class="initial-loader">
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="any" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="Explore the best universities across Europe and the world with FindYourUni.eu. Compare rankings, discover top programs, and find your perfect study destination today!" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://findyouruni.eu/" />
    <meta property="og:title" content="University Finder - Discover Top Universities" />
    <meta property="og:description" content="Explore the best universities across Europe and the world. Compare rankings, discover top programs, and find your perfect study destination today!" />
    <meta property="og:image" content="https://findyouruni.eu/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://findyouruni.eu/" />
    <meta name="twitter:title" content="University Finder - Discover Top Universities" />
    <meta name="twitter:description" content="Explore the best universities across Europe and the world. Compare rankings, discover top programs, and find your perfect study destination today!" />
    <meta name="twitter:image" content="https://findyouruni.eu/og-image.png" />

    <meta name="robots" content="index, follow">

    <title>FindYourUni.eu - Discover Top Universities in Europe</title>
  </head>
  <body>
    <div id="root">
      <style>
        .initial-loader {
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          width: 100vw;
          background-color: #f8fafc;
          font-family: system-ui, sans-serif;
        }
        .spinner {
          width: 40px;
          height: 40px;
          border: 4px solid #bfdbfe;
          border-top: 4px solid #3b82f6;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        }
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
      <div class="initial-loader">
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
